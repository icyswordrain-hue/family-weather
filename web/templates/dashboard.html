<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Context-aware, voice-enabled family weather broadcaster" />
  <meta name="theme-color" content="#1a2235" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="icon" href="/static/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/static/icon-192.svg" />
  <title>家庭天氣儀表板</title>
  <link rel="stylesheet" href="/static/style.css?v=16" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;500;600;700;800&family=ZCOOL+XiaoWei&family=Noto+Sans+TC:wght@400;500;700&display=swap"
    rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>

  <!-- ── App Shell ─────────────────────────────────────────────────────────── -->
  <div class="app-shell">

    <!-- Mobile Compact Header (hidden on desktop) -->
    <header class="compact-header" id="mobile-header">
      <span id="mobile-clock">--:--</span>
      <span class="mobile-location" id="mobile-location">—</span>
    </header>

    <!-- ── Left Sidebar ──────────────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="clock-wrapper">
          <div class="analog-clock">
            <div class="hand hour" id="clock-hour"></div>
            <div class="hand minute" id="clock-minute"></div>
            <div class="hand second" id="clock-second"></div>
            <div class="center-dot"></div>
            <!-- Face markers -->
            <div class="marker m-12"></div>
            <div class="marker m-3"></div>
            <div class="marker m-6"></div>
            <div class="marker m-9"></div>
          </div>
        </div>
        <div class="rp-location" id="rp-location">—</div>
      </div>

      <nav class="sidebar-nav">
        <p class="nav-section-label" data-i18n="nav_section">功能</p>
        <button class="nav-item active" data-view="lifestyle">
          <span class="nav-icon">🚲</span>
          <span data-i18n="nav_lifestyle">生活建議</span>
        </button>
        <button class="nav-item" data-view="dashboard">
          <span class="nav-icon">📊</span>
          <span data-i18n="nav_dashboard">天氣總覽</span>
        </button>
      </nav>

      <!-- Sidebar Controls -->
      <div class="sidebar-controls" id="sidebar-controls">
        <div class="sidebar-control-group">
          <span class="sidebar-control-label" data-i18n="lang_label">Language</span>
          <div class="seg-ctrl" role="group" aria-label="Language">
            <label class="seg-option">
              <input type="radio" name="language" value="en" aria-label="English"> <span>EN</span>
            </label>
            <label class="seg-option">
              <input type="radio" name="language" value="zh-TW" checked aria-label="中文"> <span>中文</span>
            </label>
          </div>
        </div>
        <div class="sidebar-control-group">
          <span class="sidebar-control-label" data-i18n="provider_label">Provider</span>
          <div class="seg-ctrl" role="group" aria-label="Provider">
            <label class="seg-option">
              <input type="radio" name="provider" value="CLAUDE" checked aria-label="Claude"> <span>Claude</span>
            </label>
            <label class="seg-option">
              <input type="radio" name="provider" value="GEMINI" aria-label="Gemini"> <span>Gemini</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Status + Refresh -->
      <div class="sidebar-status" id="sidebar-status">
        <div id="rp-last-updated" class="rp-last-updated"></div>
        <button class="rp-btn" id="refresh-btn" title="Fetch latest data" aria-label="Refresh Weather">
          <span class="refresh-icon" aria-hidden="true">🔄</span>
          <span data-i18n="refresh_btn">重新整理</span>
        </button>
      </div>

    </aside>

    <!-- ── Main Content ────────────────────────────────────────────────────── -->
    <main class="main-panel">

      <!-- ── Loading / Error States ──────────────────────────────────────── -->
      <div class="loading-screen" id="loading-screen">
        <div class="spinner"></div>
        <p id="loading-text">正在獲取天氣…</p>
      </div>

      <div class="error-screen hidden" id="error-screen">
        <div class="error-icon">⚠️</div>
        <p class="error-msg" id="error-msg">廣播載入失敗。</p>
        <button onclick="window.app.fetchBroadcast()" class="retry-btn">重試</button>
      </div>

      <!-- ── Loading Overlay (Optimistic) ──────────────────────────────── -->
      <div id="optimistic-loading" class="optimistic-loading hidden">
        <span class="spinner-small"></span>
        <span data-i18n="loading">正在獲取天氣…</span>
      </div>

      <!-- ── Content (shown after load) ────────────────────────────────── -->
      <div class="main-content hidden" id="main-content">

        <!-- VIEW 1: Lifestyle (Default) -->
        <div id="view-lifestyle" class="view-container active">
          <header class="view-header">
            <h1 id="view-heading-lifestyle" data-i18n="h1_lifestyle">生活指南</h1>
          </header>
          <div class="section-header-card">
            <span>🚲</span>
            <span data-i18n="nav_lifestyle">生活建議</span>
          </div>
          <div class="lifestyle-grid" id="lifestyle-grid"></div>
        </div>

        <!-- VIEW 2: Dashboard (Overview) -->
        <div id="view-dashboard" class="view-container">
          <header class="view-header">
            <h1 id="view-heading-dashboard" data-i18n="h1_dashboard">天氣儀表板</h1>
          </header>
          <div class="section-header-card">
            <span>📊</span>
            <span data-i18n="nav_dashboard">天氣總覽</span>
          </div>
          <div class="current-conditions-wrapper">
            <div class="current-top-row">
              <div class="gauge-card" id="gauge-ground"></div>
              <div class="current-hero">
                <div class="hero-main">
                  <span id="cur-icon"></span>
                  <span id="cur-temp">--</span>
                </div>
                <div id="cur-weather-text">--</div>
              </div>
              <div class="gauge-card" id="gauge-wind"></div>
            </div>

            <div class="gauges-grid">
              <div class="gauge-card" id="gauge-hum"></div>
              <div class="gauge-card" id="gauge-aqi"></div>
              <div class="gauge-card" id="gauge-uv"></div>
              <div class="gauge-card" id="gauge-pres"></div>
            </div>
          </div>

          <hr class="view-divider">

          <div class="dashboard-overview-section">
            <h2 class="section-title" id="section-heading-24h">24 小時預報</h2>
            <div class="timeline-grid" id="ov-timeline"></div>
          </div>

          <div class="dashboard-overview-section">
            <h2 class="section-title" id="section-heading-7day">七日預報</h2>
            <div class="timeline-scroll" id="ov-weekly-timeline"></div>
            <div class="weekly-sparkline-wrap">
              <canvas id="ov-weekly-sparkline"></canvas>
            </div>
          </div>

        </div>
      </div> <!-- End main-content -->

      <!-- Player Bar -->
      <div class="player-bar" id="player-bar">
        <button class="player-play-btn" id="player-play-btn" aria-label="Play/Pause">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <polygon id="player-play-icon" points="5,3 17,10 5,17" />
          </svg>
        </button>
        <span class="player-label" id="player-label">
          <span class="player-cloud-icon" id="player-cloud-icon">☁</span>
          <span id="player-title">Fetching briefing…</span>
        </span>
        <div class="player-progress-wrap">
          <div class="player-progress-bar" id="player-progress-bar"></div>
        </div>
        <span class="player-duration" id="player-duration">--:--</span>
        <button class="player-sheet-toggle" id="player-sheet-toggle" aria-label="Show transcript">⌄</button>
        <audio id="player-audio" preload="none"></audio>
      </div>

      <!-- Player Sheet (half-sheet overlay for narration text) -->
      <div class="player-sheet" id="player-sheet" aria-hidden="true">
        <div class="player-sheet-header">
          <span class="player-sheet-title">Narration</span>
          <button class="player-sheet-close" id="player-sheet-close" aria-label="Close">✕</button>
        </div>
        <div class="player-sheet-body" id="player-sheet-body">
          <!-- narration text rendered here by JS -->
        </div>
      </div>
      <div class="player-sheet-backdrop" id="player-sheet-backdrop"></div>

      <!-- FAB (mobile controls) -->
      <button class="fab-btn" id="fab-btn" aria-label="Settings">⚙️</button>
      <div class="fab-sheet" id="fab-sheet" aria-hidden="true">
        <div class="fab-sheet-inner">
          <div class="sidebar-control-group">
            <span class="sidebar-control-label" data-i18n="lang_label">Language</span>
            <div class="seg-ctrl fab-seg" role="group">
              <label class="seg-option">
                <input type="radio" name="language-fab" value="en">
                <span>EN</span>
              </label>
              <label class="seg-option">
                <input type="radio" name="language-fab" value="zh-TW" checked>
                <span>中文</span>
              </label>
            </div>
          </div>
          <div class="sidebar-control-group">
            <span class="sidebar-control-label" data-i18n="provider_label">Provider</span>
            <div class="seg-ctrl fab-seg" role="group">
              <label class="seg-option">
                <input type="radio" name="provider-fab" value="CLAUDE" checked>
                <span>Claude</span>
              </label>
              <label class="seg-option">
                <input type="radio" name="provider-fab" value="GEMINI">
                <span>Gemini</span>
              </label>
            </div>
          </div>
          <button class="rp-btn" id="fab-refresh-btn" data-i18n="refresh_btn">重新整理</button>
        </div>
      </div>
      <div class="fab-backdrop" id="fab-backdrop"></div>

    </main>

    <!-- ── Right Panel ────────────────────────────────────────────────────── -->
    <aside class="right-panel">

      <!-- System Log -->
      <div class="rp-log-container">
        <div class="rp-log-header">
          <span data-i18n="log_title">系統記錄</span>
          <span class="log-clear-btn" onclick="document.getElementById('rp-log-list').innerHTML=''"
            title="Clear Log">🗑️</span>
        </div>
        <div class="rp-log-list" id="rp-log-list"></div>
      </div>
    </aside>

  </div><!-- /app-shell -->

  <script src="/static/app.js?v=17"></script>
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/service-worker.js').catch(() => { });
    }
  </script>
</body>

</html>
