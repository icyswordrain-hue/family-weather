<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Canopy — 厝邊天氣 · Context-aware, voice-enabled family weather broadcaster" />
  <meta name="theme-color" content="#1a2235" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f5ede4" media="(prefers-color-scheme: light)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="icon" href="/static/favicon.svg?v=1" type="image/svg+xml" />
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png?v=5" />
  <link rel="icon" type="image/webp" sizes="512x512" href="/static/icon-512-any.webp?v=3" />
  <link rel="apple-touch-icon" href="/static/icon-512-maskable.webp?v=2" />
  <title>厝邊天氣 — Canopy</title>
  <link rel="stylesheet" href="/static/style.css?v=20" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;500;600;700;800&family=ZCOOL+XiaoWei&family=Noto+Sans+TC:wght@400;500;700&display=swap"
    rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>

  <!-- ── App Shell ─────────────────────────────────────────────────────────── -->
  <div class="app-shell">

    <!-- Mobile Compact Header (hidden on desktop) -->
    <header class="compact-header" id="mobile-header">
      <span id="mobile-clock">--:--</span>
      <div class="mobile-meta">
        <span class="mobile-location" id="mobile-location">—</span>
        <span id="mobile-last-updated"></span>
      </div>
    </header>

    <!-- ── Left Sidebar ──────────────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="clock-wrapper">
          <div class="analog-clock">
            <div class="hand hour" id="clock-hour"></div>
            <div class="hand minute" id="clock-minute"></div>
            <div class="hand second" id="clock-second"></div>
            <div class="center-dot"></div>
            <!-- Face markers -->
            <div class="marker m-12"></div>
            <div class="marker m-3"></div>
            <div class="marker m-6"></div>
            <div class="marker m-9"></div>
          </div>
        </div>
        <div class="rp-location" id="rp-location">—</div>
      </div>

      <nav class="sidebar-nav">
        <p class="nav-section-label" data-i18n="nav_section">功能</p>
        <button class="nav-item active" data-view="lifestyle">
          <span class="nav-icon"><img src="/static/brand-icons/morning-shade.webp" class="brand-icon" alt="" /></span>
          <span data-i18n="nav_lifestyle">生活建議</span>
        </button>
        <button class="nav-item" data-view="dashboard">
          <span class="nav-icon"><img src="/static/brand-icons/dusk-cover.webp" class="brand-icon" alt="" /></span>
          <span data-i18n="nav_dashboard">天氣總覽</span>
        </button>
        <button class="nav-item nav-settings-trigger" id="sidebar-settings-btn" aria-label="Settings">
          <span class="nav-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </span>
          <span data-i18n="tab_settings">設定</span>
        </button>
      </nav>

    </aside>

    <!-- ── Main Content ────────────────────────────────────────────────────── -->
    <main class="main-panel">

      <!-- ── Loading / Error States ──────────────────────────────────────── -->
      <div class="loading-screen" id="loading-screen">
        <div class="spinner"></div>
        <p id="loading-text">正在獲取天氣…</p>
      </div>

      <div class="error-screen hidden" id="error-screen">
        <div class="error-icon"><img src="/static/brand-icons/alert.webp" class="brand-icon" alt="Error" /></div>
        <p class="error-msg" id="error-msg">廣播載入失敗。</p>
        <button onclick="window.app.fetchBroadcast()" class="retry-btn">重試</button>
      </div>

      <!-- ── Loading Overlay (Optimistic) ──────────────────────────────── -->
      <div id="optimistic-loading" class="optimistic-loading hidden">
        <span class="spinner-small"></span>
        <span data-i18n="loading">正在獲取天氣…</span>
      </div>

      <!-- ── Content (shown after load) ────────────────────────────────── -->
      <div class="main-content hidden" id="main-content">

        <!-- VIEW 1: Lifestyle (Default) -->
        <div id="view-lifestyle" class="view-container active">
          <header class="view-header">
            <img src="/static/brand-icons/daily-canopy-slab.webp" class="heading-slab" alt="" aria-hidden="true" />
            <h1><span id="view-heading-lifestyle" data-i18n="h1_lifestyle">生活建議</span></h1>
            <button id="ls-expand-all-btn" class="ls-expand-all-btn" data-i18n="ls_expand_all">全展開</button>
          </header>
          <div class="section-header-card">
            <img src="/static/brand-icons/daily-canopy-slab.webp" class="section-slab" alt="" aria-hidden="true" />
            <span data-i18n="nav_lifestyle">生活建議</span>
            <button id="ls-expand-all-btn-mobile" class="ls-expand-all-btn" data-i18n="ls_expand_all">全展開</button>
          </div>
          <div class="lifestyle-grid" id="lifestyle-grid"></div>
        </div>

        <!-- VIEW 2: Dashboard (Overview) -->
        <div id="view-dashboard" class="view-container">
          <header class="view-header">
            <img src="/static/brand-icons/high-canopy-slab.webp" class="heading-slab" alt="" aria-hidden="true" />
            <h1><span id="view-heading-dashboard" data-i18n="h1_dashboard">天氣儀表板</span></h1>
            <button id="db-expand-all-btn" class="ls-expand-all-btn" data-i18n="ls_expand_all">全展開</button>
          </header>
          <div class="section-header-card">
            <img src="/static/brand-icons/high-canopy-slab.webp" class="section-slab" alt="" aria-hidden="true" />
            <span data-i18n="nav_dashboard">天氣總覽</span>
            <button id="db-expand-all-btn-mobile" class="ls-expand-all-btn" data-i18n="ls_expand_all">全展開</button>
          </div>
          <div class="current-conditions-wrapper">
            <div class="current-top-row">
              <!-- Left: hero (icon + temp + description + solar) -->
              <div class="current-hero">
                <div class="hero-main">
                  <span id="cur-icon"></span>
                  <span id="cur-temp">--</span>
                </div>
                <div id="cur-weather-text">--</div>
                <div class="solar-row" id="solar-row">
                  <span id="solar-sunrise">--:--</span>
                  <span id="solar-sunset">--:--</span>
                </div>
              </div>
              <!-- Right: stacked column (wind, ground, outdoor trigger) -->
              <div class="current-side-stack">
                <div class="gauge-card" id="gauge-wind"></div>
                <div class="gauge-card" id="gauge-ground"></div>
                <div class="gauge-card gauge-outdoor-trigger" id="gauge-outdoor" role="button" tabindex="0" aria-expanded="false"></div>
              </div>
            </div>

            <!-- Expanded panel: hidden by default, revealed on outdoor click -->
            <div class="gauges-grid gauges-collapsed" id="gauges-expand" aria-hidden="true">
              <div class="gauge-card" id="gauge-hum"></div>
              <div class="gauge-card" id="gauge-aqi"></div>
              <div class="gauge-card" id="gauge-uv"></div>
              <div class="gauge-card" id="gauge-pres"></div>
            </div>
          </div>

          <hr class="view-divider">

          <div class="dashboard-overview-section">
            <h2 class="section-title" id="section-heading-24h">24 小時預報</h2>
            <div class="timeline-grid" id="ov-timeline"></div>
          </div>

          <div class="dashboard-overview-section">
            <h2 class="section-title" id="section-heading-7day">七日預報</h2>
            <div class="wk-header-row" id="ov-weekly-header" style="display:none"></div>
            <div class="timeline-scroll" id="ov-weekly-timeline"></div>
          </div>

        </div>
      </div> <!-- End main-content -->

      <!-- Player Bar -->
      <div class="player-bar" id="player-bar">
        <button class="player-play-btn" id="player-play-btn" aria-label="Play/Pause">
          <svg width="30" height="30" viewBox="0 0 20 20" fill="currentColor">
            <polygon id="player-play-icon" points="5,3 17,10 5,17" />
          </svg>
        </button>
        <div class="player-progress-wrap">
          <div class="player-progress-bar" id="player-progress-bar"></div>
        </div>
        <span class="player-duration" id="player-duration">--:-- / --:--</span>
        <span class="player-audio-age" id="player-audio-age" hidden></span>
        <button class="player-speed-btn" id="player-speed-btn" aria-label="Playback speed">1.2×</button>
        <button class="player-chat-btn" id="player-chat-btn" aria-label="Ask weather question" hidden>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
        <button class="player-sheet-toggle" id="player-sheet-toggle" aria-label="Show transcript">
          <svg width="22" height="22" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4,7 10,13 16,7" />
          </svg>
        </button>
        <audio id="player-audio" preload="none"></audio>
      </div>

      <!-- Player Sheet (half-sheet overlay for narration text) -->
      <div class="player-sheet" id="player-sheet" aria-hidden="true">
        <div class="player-sheet-handle" aria-hidden="true"></div>
        <div class="player-sheet-header">
          <div class="ps-seal-nav">
            <button class="ps-seal active" data-tab="narration" aria-label="Narration">活</button>
            <button class="ps-seal" data-tab="settings" aria-label="Settings">⚙</button>
          </div>
          <button class="player-sheet-close" id="player-sheet-close" aria-label="Close">✕</button>
        </div>
        <div class="ps-scroll-rule"></div>
        <div class="player-sheet-body" id="player-sheet-body">
          <!-- Narration tab -->
          <div class="ps-tab-panel" id="ps-panel-narration">
            <div class="ps-controls">
              <div class="ps-controls-row">
                <span class="ps-duration" id="ps-duration">0:00 / --:--</span>
                <div class="ps-speed-group">
                  <button class="ps-speed-pill" data-speed="1.0">1.0×</button>
                  <button class="ps-speed-pill" data-speed="1.2">1.2×</button>
                  <button class="ps-speed-pill" data-speed="1.5">1.5×</button>
                </div>
              </div>
            </div>
            <div class="ps-scroll-row">
              <div class="ps-ink-track">
                <div class="ps-ink-track-bg"></div>
                <div class="ps-ink-fill" id="ps-ink-fill"></div>
              </div>
              <div class="ps-scroll-content">
                <div id="ps-narration-content">
                  <!-- narration paragraphs rendered here by JS -->
                </div>
              </div>
            </div>
          </div>
          <!-- Settings tab -->
          <div class="ps-tab-panel" id="ps-panel-settings" hidden>
            <div class="ps-section-card">
              <span class="ps-section-label" data-i18n="provider_label">AI Provider</span>
              <div class="seg-ctrl" role="group" aria-label="AI Provider">
                <label class="seg-option">
                  <input type="radio" name="provider" value="CLAUDE" checked aria-label="Claude">
                  <span>Claude</span>
                </label>
                <label class="seg-option">
                  <input type="radio" name="provider" value="GEMINI" aria-label="Gemini">
                  <span>Gemini</span>
                </label>
              </div>
            </div>
            <div class="ps-section-card">
              <span class="ps-section-label" data-i18n="lang_label">Language</span>
              <div class="seg-ctrl" role="group" aria-label="Language">
                <label class="seg-option">
                  <input type="radio" name="language" value="en" aria-label="English">
                  <span>EN</span>
                </label>
                <label class="seg-option">
                  <input type="radio" name="language" value="zh-TW" checked aria-label="中文">
                  <span>中文</span>
                </label>
              </div>
            </div>
            <div class="ps-section-card">
              <div id="rp-last-updated" class="ps-last-updated"></div>
              <button class="ps-btn" id="refresh-btn" title="Fetch latest data" aria-label="Refresh Weather">
                <svg class="refresh-icon" aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                  <path d="M3 3v5h5" />
                  <path d="M21 12a9 9 0 1 0-9 9 9.75 9.75 0 0 0 6.74-2.74L21 16" />
                  <path d="M21 21v-5h-5" />
                </svg>
                <span data-i18n="refresh_btn">重新整理</span>
              </button>
              <button class="ps-btn ps-btn-secondary" id="sheet-tts-btn">
                <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                  <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                  <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                </svg>
                <span data-i18n="tts_btn">重新合成語音</span>
              </button>
            </div>
          </div>
          <!-- Chat tab -->
          <div class="ps-tab-panel" id="ps-panel-chat" hidden>
            <div class="chat-messages" id="chat-messages" role="log" aria-live="polite"></div>
            <div class="chat-suggestions" id="chat-suggestions"></div>
            <form class="chat-input-row" id="chat-form" autocomplete="off">
              <input class="chat-input" id="chat-input" type="text" maxlength="500" autocomplete="off" spellcheck="true" />
              <button class="chat-send" type="submit" id="chat-send" aria-label="Send">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
              </button>
            </form>
          </div>
        </div>
      </div>
      <div class="player-sheet-backdrop" id="player-sheet-backdrop"></div>


    </main>

    <!-- ── Right Panel ────────────────────────────────────────────────────── -->
    <aside class="right-panel">

      <!-- System Log -->
      <div class="rp-log-container">
        <div class="rp-log-header">
          <span data-i18n="log_title">系統記錄</span>
          <span class="log-clear-btn" onclick="document.getElementById('rp-log-list').innerHTML=''"
            title="Clear Log">🗑️</span>
        </div>
        <div class="rp-log-list" id="rp-log-list"></div>
      </div>
    </aside>

  </div><!-- /app-shell -->

  <script src="/static/app.js?v=18"></script>
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/service-worker.js').catch(() => { });
    }
  </script>
</body>

</html>
